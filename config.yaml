stt:
  backend: parakeet_onnx
  model: nemo-parakeet-tdt-0.6b-v2
  device: cuda
  language: en
  quantization: int8
tts:
  backend: kokoro
  voice: af_bella
  device: cuda
vad:
  backend: silero
  threshold: 0.5
  stop_secs: 0.8
turn_detection:
  backend: smart_turn_v3
  device: cpu
llm:
  backend: langgraph              # in-backend helmsman (needs the `langgraph` extra)
  base_url: http://localhost:1234/v1   # LM Studio /v1 (chat + bge-m3 embeddings)
  model: unsloth/gemma-4-e4b-it
  api_key_env: LLM_API_KEY
  timeout_seconds: 30
  max_retries: 1
  rerank: true
  expansion: true                 # RAG adjacent-chunk expansion (Qdrant scroll); independent of rerank
  qdrant_url: http://localhost:6333
  qdrant_collection: maritime_hybrid
  qdrant_api_key_env: QDRANT_API_KEY
  embedding_model: text-embedding-bge-m3
  retrieval_top_k: 20
  langfuse_enabled: false         # true + LANGFUSE_* keys -> trace every LLM/retrieval step
  langfuse_host:                  # blank = Langfuse Cloud; set for a self-hosted instance
  audit_enabled: true             # write command_runtime / question_runtime rows to the audit log
  audit_db_path: ./data/ingestion.db   # shared with review.db_path
simulator:
  backend: mock
  real:
    host: 127.0.0.1
    port: 9100
    connect_timeout_seconds: 2
  mock:
    initial_heading: 0
    initial_engine_order: stop
    log_commands: true
audio:                             # voice is always browser audio over WebRTC (needs api.enabled + the `webrtc` extra; see docs/BROWSER_AUDIO.md)
  sample_rate: 16000               # STT input rate for the offline benchmark harness (scripts/bench_stt.py)
  ice_servers: ["stun:stun.l.google.com:19302"]   # STUN/TURN for WebRTC ICE
logging:
  level: info
  format: json
  conversation_log_path: ./logs/conversations
  metrics_log_path: ./logs/metrics
api:
  enabled: true
  host: 127.0.0.1
  port: 8765
  cors_allow_origins:
  - '*'
documents:
  qdrant_url: http://127.0.0.1:6333
  qdrant_collection: maritime_hybrid
  qdrant_api_key_env: QDRANT_API_KEY
  document_id_field: hitl_batch_id
  title_field: filename
  source_field: document_type
  uploaded_at_field: upload_timestamp
  scroll_limit: 10000
  request_timeout_seconds: 30
review:
  # In-backend HITL ingestion (see docs/LOCAL_INGESTION.md).
  db_path: ./data/ingestion.db     # pending review batches + audit log; shared with llm.audit_db_path
  llm_base_url: http://localhost:1234/v1   # LM Studio (doc summary + embeddings)
  llm_api_key_env: LLM_API_KEY
  qdrant_url: http://127.0.0.1:6333
  qdrant_api_key_env: QDRANT_API_KEY
  embedding_model: text-embedding-bge-m3
  default_document_type: PDF
  default_collection_name: maritime_hybrid
  default_categories: algemeen
  default_chunking_strategy: paragraph_aware
  request_timeout_seconds: 60
  langfuse_enabled: false          # true -> trace the doc-summary call
