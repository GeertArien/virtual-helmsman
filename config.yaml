stt:
  backend: parakeet_onnx
  model: nemo-parakeet-tdt-0.6b-v2
  device: cuda
  language: en
  quantization: int8
tts:
  backend: kokoro
  voice: af_bella
  device: cuda
vad:
  backend: silero
  threshold: 0.5
  stop_secs: 0.8
turn_detection:
  backend: smart_turn_v3
  device: cpu
llm:
  backend: n8n
  base_url: http://localhost:5678
  model: unsloth/gemma-4-e4b-it
  api_key_env: LLM_API_KEY
  timeout_seconds: 30
  max_retries: 1
  webhook_path: /webhook/helmsman
  rerank: true
simulator:
  backend: mock
  real:
    host: 127.0.0.1
    port: 9100
    connect_timeout_seconds: 2
  mock:
    initial_heading: 0
    initial_engine_order: stop
    log_commands: true
audio:
  input_device: default
  output_device: default
  sample_rate: 16000
logging:
  level: info
  format: json
  conversation_log_path: ./logs/conversations
  metrics_log_path: ./logs/metrics
api:
  enabled: true
  host: 127.0.0.1
  port: 8765
  cors_allow_origins:
  - '*'
documents:
  qdrant_url: http://127.0.0.1:6333
  qdrant_collection: maritime_hybrid
  qdrant_api_key_env: QDRANT_API_KEY
  document_id_field: hitl_batch_id
  title_field: filename
  source_field: document_type
  uploaded_at_field: upload_timestamp
  scroll_limit: 10000
  request_timeout_seconds: 30
review:
  n8n_base_url: http://127.0.0.1:5678
  upload_path: /webhook/review/upload
  pending_path: /webhook/review/pending
  audit_log_path: /webhook/audit-log
  audit_event_path: /webhook/audit-event
  default_document_type: PDF
  default_collection_name: maritime_hybrid
  default_categories: algemeen
  default_chunking_strategy: paragraph_aware
  request_timeout_seconds: 60
