stt:
  backend: parakeet_onnx
  model: nemo-parakeet-tdt-0.6b-v2
  device: cuda
  language: en
  quantization: int8
tts:
  backend: kokoro
  voice: af_bella
  device: cuda
vad:
  backend: silero
  threshold: 0.5
  stop_secs: 0.8
turn_detection:
  backend: smart_turn_v3
  device: cpu
llm:
  backend: langgraph              # in-backend helmsman (needs the `langgraph` extra)
  model: unsloth/gemma-4-e4b-it   # any model id the lm_studio server serves
  timeout_seconds: 30
  max_retries: 1
  rerank: true
  expansion: true                 # RAG adjacent-chunk expansion (Qdrant scroll); independent of rerank
  retrieval_top_k: 20
  audit_enabled: true             # write command_runtime / question_runtime rows to the audit log
lm_studio:                        # the OpenAI-compatible /v1 server: chat + bge-m3 embeddings
  base_url: http://localhost:1234/v1
  api_key_env: LLM_API_KEY
  embedding_model: text-embedding-bge-m3
qdrant:                           # shared by RAG retrieval, ingestion, and the Documents page
  url: http://localhost:6333
  api_key_env: QDRANT_API_KEY
  collection: maritime_hybrid
langfuse:                         # optional tracing of LLM/retrieval steps + the doc-summary call
  enabled: false                  # true + LANGFUSE_* keys to trace
  host:                           # blank = Langfuse Cloud; set for a self-hosted instance
database:
  path: ./data/ingestion.db       # SQLite: HITL pending batches + the audit log (runtime + ingestion)
simulator:
  backend: mock
  real:
    host: 127.0.0.1
    port: 9100
    connect_timeout_seconds: 2
  mock:
    initial_heading: 0
    initial_engine_order: stop
    log_commands: true
audio:                             # voice is always browser audio over WebRTC (needs api.enabled + the `webrtc` extra; see docs/BROWSER_AUDIO.md)
  sample_rate: 16000               # STT input rate for the offline benchmark harness (scripts/bench_stt.py)
  ice_servers: ["stun:stun.l.google.com:19302"]   # STUN/TURN for WebRTC ICE
logging:
  level: info
  format: json
  conversation_log_path: ./logs/conversations
  metrics_log_path: ./logs/metrics
api:
  enabled: true
  host: 127.0.0.1
  port: 8765
  cors_allow_origins:
  - '*'
documents:                         # Qdrant connection is the shared `qdrant:` block; these are payload-mapping knobs
  document_id_field: hitl_batch_id
  title_field: filename
  source_field: document_type
  uploaded_at_field: upload_timestamp
  scroll_limit: 10000
  request_timeout_seconds: 30
review:                            # In-backend HITL ingestion (see docs/LOCAL_INGESTION.md); store/qdrant/lm_studio are shared blocks
  default_document_type: PDF
  default_categories: algemeen
  default_chunking_strategy: paragraph_aware
  request_timeout_seconds: 60
