# Example: Piper TTS backend instead of Kokoro.
# Differs from the default only in the tts block.

stt:
  backend: parakeet_onnx
  model: nemo-parakeet-tdt-0.6b-v2
  device: cuda
  language: en
  quantization: int8

tts:
  backend: piper
  voice: en_US-lessac-medium
  device: cuda

vad:
  backend: silero
  threshold: 0.5
  stop_secs: 0.8

turn_detection:
  backend: smart_turn_v3
  device: cpu

llm:
  backend: openai_compatible
  base_url: http://localhost:1234/v1
  model: unsloth/gemma-4-e4b-it
  api_key_env: LLM_API_KEY
  timeout_seconds: 30
  max_retries: 1

simulator:
  backend: mock
  real:
    host: 127.0.0.1
    port: 9100
    connect_timeout_seconds: 2
  mock:
    initial_heading: 0
    initial_engine_order: stop
    log_commands: true

audio:
  sample_rate: 16000

logging:
  level: info
  format: json
  conversation_log_path: ./logs/conversations
  metrics_log_path: ./logs/metrics
