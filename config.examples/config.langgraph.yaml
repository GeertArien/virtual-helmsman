# Example: fully in-backend helmsman (no n8n at all).
#
# Replaces the n8n runtime workflow with the native `langgraph` LLM backend
# (intent classify -> command parse / hybrid-RAG with rerank + adjacent-chunk
# expansion) AND the n8n ingestion workflow with the local HITL review
# pipeline. Requires the optional extra:
#   pip install -e ".[langgraph]"
#
# The shared `qdrant` / `lm_studio` / `database` blocks are consumed by the LLM
# backend, the Documents page, and the ingestion pipeline alike -- so once they
# are set the `documents` / `review` blocks need nothing further (defaults).
# See docs/LANGGRAPH_BACKEND.md and docs/LOCAL_INGESTION.md.

stt:
  backend: parakeet_onnx
  model: nemo-parakeet-tdt-0.6b-v2
  device: cuda
  language: en
  quantization: int8

tts:
  backend: kokoro
  voice: af_bella
  device: cuda

vad:
  backend: silero
  threshold: 0.5
  stop_secs: 0.8

turn_detection:
  backend: smart_turn_v3
  device: cpu

llm:
  backend: langgraph
  model: unsloth/gemma-4-e4b-it
  timeout_seconds: 30
  max_retries: 1
  rerank: true                         # LLM listwise rerank to top-3 (else RRF top-3)
  expansion: true                      # adjacent-chunk (±1) expansion
  retrieval_top_k: 20
  audit_enabled: true                  # runtime command/question rows in the audit log

lm_studio:                             # the OpenAI-compatible /v1 server: chat + bge-m3 embeddings
  base_url: http://localhost:1234/v1
  api_key_env: LLM_API_KEY
  embedding_model: text-embedding-bge-m3

qdrant:                                # omit `url` to run command-only (questions error gracefully)
  url: http://localhost:6333
  api_key_env: QDRANT_API_KEY
  collection: maritime_hybrid

langfuse:                              # optional tracing of LLM/retrieval + the doc-summary call
  enabled: false                       # true + LANGFUSE_* keys -> trace every step
  host:                                # blank = Langfuse Cloud; or http://localhost:3000

database:
  path: ./data/ingestion.db            # HITL pending batches + the audit log

api:
  enabled: true

simulator:
  backend: mock
  real:
    host: 127.0.0.1
    port: 9100
    connect_timeout_seconds: 2
  mock:
    initial_heading: 0
    initial_engine_order: stop
    log_commands: true

audio:
  sample_rate: 16000

logging:
  level: info
  format: json
  conversation_log_path: ./logs/conversations
  metrics_log_path: ./logs/metrics
