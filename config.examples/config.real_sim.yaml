# Example: integrate against the real simulator.
# Differs from the default only in the simulator block. Needs the vendor
# integration hand-dropped -- see
# voice_agent/backends/simulator/vendor/README.md.

stt:
  backend: parakeet_onnx
  model: nemo-parakeet-tdt-0.6b-v2
  device: cuda
  language: en
  quantization: int8

tts:
  backend: kokoro
  voice: af_bella
  device: cuda

vad:
  backend: silero
  threshold: 0.5
  stop_secs: 0.8

turn_detection:
  backend: smart_turn_v3
  device: cpu

llm:
  backend: langgraph
  model: unsloth/gemma-4-e4b-it
  rerank: true
  expansion: true
  timeout_seconds: 30
  max_retries: 1
lm_studio:
  base_url: http://localhost:1234/v1
  api_key_env: LLM_API_KEY
  embedding_model: text-embedding-bge-m3
qdrant:
  url: http://localhost:6333
  collection: maritime_hybrid

simulator:
  backend: real                    # drives the locally vendored wrapper
  real:
    # Two pairs, not one: the link is connectionless, so each side says where
    # it sends and where it listens. The two sides are mirror images -- change
    # both together, or the link goes quiet with no error anywhere.
    #
    # The ports and frame rate are properties of the simulator installation
    # and come with the vendor integration notes. They are deliberately not
    # recorded in this repository: 0 means "not configured", and the real
    # backend refuses to start until you set the working values in a LOCAL
    # copy of this file (never commit them).
    remote_host: 127.0.0.1         # we send here; the simulator listens here
    remote_port: 0
    # We listen here. Loopback on purpose: the link is unauthenticated --
    # whatever arrives on this socket is believed as ship state. Use 0.0.0.0
    # (or a specific interface) only when the simulator runs on another host.
    local_host: 127.0.0.1
    local_port: 0
    # Startup is never blocked on the simulator: if it is not running yet, the
    # agent comes up on a quiet bridge and keeps trying in the background.
    connect_timeout_seconds: 5
    expected_fps: 0                # simulator broadcast rate; comes with the vendor integration
    stale_after_missed_frames: 20  # frames of silence tolerated before the link counts as stale
    reconnect_initial_seconds: 1
    reconnect_max_seconds: 15
  mock:
    initial_heading: 0
    initial_engine_order: stop
    log_commands: true

audio:
  sample_rate: 16000

logging:
  level: info
  format: json
  conversation_log_path: ./logs/conversations
  metrics_log_path: ./logs/metrics
