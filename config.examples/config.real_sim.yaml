# Example: integrate against the real (UDP-syncing) simulator.
# Differs from the default only in simulator.backend. Windows-only.

stt:
  backend: parakeet_onnx
  model: nemo-parakeet-tdt-0.6b-v2
  device: cuda
  language: en
  quantization: int8

tts:
  backend: kokoro
  voice: af_bella
  device: cuda

vad:
  backend: silero
  threshold: 0.5
  stop_secs: 0.8

turn_detection:
  backend: smart_turn_v3
  device: cpu

llm:
  backend: langgraph
  base_url: http://localhost:1234/v1
  model: unsloth/gemma-4-e4b-it
  rerank: true
  expansion: true
  api_key_env: LLM_API_KEY
  timeout_seconds: 30
  max_retries: 1
  qdrant_url: http://localhost:6333
  qdrant_collection: maritime_hybrid
  embedding_model: text-embedding-bge-m3

simulator:
  backend: real                    # wraps the vendored pythonnet wrappers
  real:
    host: 127.0.0.1
    port: 9100
    connect_timeout_seconds: 2
  mock:
    initial_heading: 0
    initial_engine_order: stop
    log_commands: true

audio:
  input_device: default
  output_device: default
  sample_rate: 16000

logging:
  level: info
  format: json
  conversation_log_path: ./logs/conversations
  metrics_log_path: ./logs/metrics
